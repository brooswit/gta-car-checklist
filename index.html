<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA Online - Do I Have This Car?</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-bottom: 2px solid #f5c518;
    padding: 1rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  h1 {
    font-size: 1.4rem;
    color: #f5c518;
    margin-bottom: 0.75rem;
  }
  .controls {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
  }
  input[type="search"] {
    flex: 1;
    min-width: 200px;
    padding: 0.5rem 0.75rem;
    background: #111;
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    font-size: 0.95rem;
  }
  input[type="search"]::placeholder { color: #666; }
  input[type="search"]:focus { outline: none; border-color: #f5c518; }
  select {
    padding: 0.5rem;
    background: #111;
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    font-size: 0.95rem;
  }
  .filter-btn {
    padding: 0.5rem 1rem;
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    color: #ccc;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .filter-btn.active { background: #f5c518; color: #000; border-color: #f5c518; font-weight: 600; }
  .stats {
    font-size: 0.85rem;
    color: #888;
    padding: 0.5rem 1.5rem;
    background: #0f0f0f;
    border-bottom: 1px solid #1a1a1a;
  }
  .stats span { color: #f5c518; font-weight: 600; }
  .class-group { margin: 1rem 1.5rem; }
  .class-header {
    font-size: 1rem;
    color: #f5c518;
    padding: 0.5rem 0;
    border-bottom: 1px solid #222;
    margin-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
  }
  .class-count { color: #666; font-size: 0.85rem; }
  .car-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.75rem;
  }
  .car-item {
    display: flex;
    flex-direction: column;
    background: #151515;
    border: 1px solid #222;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    overflow: hidden;
    position: relative;
  }
  .car-item:hover { border-color: #444; background: #1a1a1a; }
  .car-item.owned { border-color: #2d5a27; background: #0d1f0b; }
  .car-img-wrap {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #0c0c0c;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .car-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .car-img-wrap .no-img {
    color: #333;
    font-size: 0.75rem;
  }
  .car-item .check {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 24px;
    height: 24px;
    border: 2px solid #555;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    background: rgba(0,0,0,0.6);
  }
  .car-item.owned .check { background: #4caf50; border-color: #4caf50; color: #fff; }
  .car-info { padding: 0.5rem 0.6rem; min-width: 0; }
  .car-name { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .car-mfg { font-size: 0.7rem; color: #666; }
  .car-store { font-size: 0.65rem; color: #888; margin-top: 2px; line-height: 1.3; }
  .car-store .store-tag {
    display: inline-block;
    background: #1a1a2e;
    border: 1px solid #2a2a4e;
    border-radius: 3px;
    padding: 0 4px;
    margin: 1px 2px 1px 0;
    font-size: 0.6rem;
    color: #8888cc;
  }
  .car-store .store-tag.pdm { background: #2e1a1a; border-color: #4e2a2a; color: #cc8888; }
  .car-features { display: flex; flex-wrap: wrap; gap: 3px; padding: 0 0.6rem 0.4rem; }
  .feat-badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.55rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .feat-hsw { background: #1a3a1a; color: #6c6; border: 1px solid #2a5a2a; }
  .feat-drift { background: #3a3a1a; color: #cc6; border: 1px solid #5a5a2a; }
  .feat-jammer { background: #1a2a3a; color: #6ac; border: 1px solid #2a4a5a; }
  .feat-weapon { background: #3a1a1a; color: #c66; border: 1px solid #5a2a2a; }
  .feat-bennys { background: #2a2a1a; color: #c90; border: 1px solid #4a4a2a; }
  .feat-imani { background: #2a1a3a; color: #a6c; border: 1px solid #4a2a5a; }
  .feat-service { background: #1a2a2a; color: #6cc; border: 1px solid #2a4a4a; }
  /* Racing tier badge */
  .tier-badge { display:inline-block; padding:1px 6px; border-radius:3px; font-size:0.6rem; font-weight:700; letter-spacing:0.5px; margin:1px 2px 1px 0; }
  .tier-S { background:#7a5c00; color:#ffd700; border:1px solid #ffd700; }
  .tier-A { background:#0a3a0a; color:#4caf50; border:1px solid #4caf50; }
  .tier-B { background:#1a3a0a; color:#8bc34a; border:1px solid #8bc34a; }
  .tier-C { background:#2a3a0a; color:#cddc39; border:1px solid #cddc39; }
  .tier-D { background:#3a3a0a; color:#ffeb3b; border:1px solid #ffeb3b; }
  .tier-E { background:#3a2a0a; color:#ffc107; border:1px solid #ffc107; }
  .tier-F { background:#3a1a0a; color:#ff9800; border:1px solid #ff9800; }
  .tier-G { background:#3a0a0a; color:#ff5722; border:1px solid #ff5722; }
  .tier-low { background:#2a0a0a; color:#888; border:1px solid #444; }
  /* Use case chips */
  .use-case-chips { display:flex; flex-wrap:wrap; gap:3px; padding:0 0.6rem 0.4rem; }
  .uc-chip { display:inline-block; padding:1px 5px; border-radius:10px; font-size:0.5rem; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; }
  .uc-racing   { background:#0a1a3a; color:#6af; border:1px solid #2a4a6a; }
  .uc-combat   { background:#3a0a0a; color:#f66; border:1px solid #6a2a2a; }
  .uc-off-road { background:#1a2a0a; color:#8c6; border:1px solid #3a5a2a; }
  .uc-transport{ background:#1a1a2a; color:#aaa; border:1px solid #3a3a5a; }
  .uc-utility  { background:#2a1a0a; color:#c96; border:1px solid #5a3a2a; }
  .uc-grinding { background:#0a2a2a; color:#6cc; border:1px solid #2a5a5a; }
  .uc-collector{ background:#2a0a2a; color:#c6c; border:1px solid #5a2a5a; }
  .uc-fun      { background:#2a2a0a; color:#fc6; border:1px solid #5a5a2a; }
  .filter-btn.uc-active { outline:2px solid #f5c518; }
  .price-filter { display:inline-flex; align-items:center; gap:4px; }
  .price-filter input { background:#1a1a2e; border:1px solid #333; border-radius:4px; color:#ccc; font-size:0.75rem; padding:3px 6px; width:90px; }
  .price-filter input::placeholder { color:#555; }
  .price-filter span { color:#666; font-size:0.75rem; }
  .car-price { font-size:0.65rem; color:#888; padding:0 0.6rem 0.1rem; }
  .car-stats { padding:0 0.6rem 0.4rem; display:flex; flex-direction:column; gap:2px; }
  .stat-row { display:flex; align-items:center; gap:4px; }
  .stat-label { font-size:0.45rem; color:#555; width:18px; text-align:right; flex-shrink:0; text-transform:uppercase; letter-spacing:0.3px; }
  .stat-bar-bg { flex:1; height:3px; background:#1a1a2e; border-radius:2px; overflow:hidden; }
  .stat-bar { height:100%; border-radius:2px; }
  .hidden { display: none; }
  .empty-state { text-align: center; color: #555; padding: 3rem; font-size: 1.1rem; }
  .loading { text-align: center; color: #888; padding: 3rem; font-size: 1.1rem; }
</style>
<script src="https://unpkg.com/launchdarkly-js-client-sdk@3/dist/ldclient.min.js"></script>
</head>
<body>
<header>
  <h1>GTA Online - Do I Have This Car?</h1>
  <div class="controls">
    <input type="search" id="search" placeholder="Search cars..." autocomplete="off">
    <select id="classFilter"><option value="">All Classes</option></select>
    <select id="storeFilter"><option value="">All Stores</option></select>
    <button class="filter-btn" id="showAll">All</button>
    <button class="filter-btn" id="showOwned">Owned</button>
    <button class="filter-btn" id="showMissing">Missing</button>
    <div class="price-filter">
      <span>$</span>
      <input type="number" id="minPrice" placeholder="Min" min="0" step="1000">
      <span>–</span>
      <input type="number" id="maxPrice" placeholder="Max" min="0" step="1000">
    </div>
    <select id="sortOrder">
      <option value="class">Sort: Class</option>
      <option value="laptime">Sort: Fastest (lap time)</option>
    </select>
  </div>
  <div class="controls" style="padding-top:0">
    <span style="color:#888;font-size:0.75rem">Use case:</span>
    <button class="filter-btn" data-uc="racing">Racing</button>
    <button class="filter-btn" data-uc="combat">Combat</button>
    <button class="filter-btn" data-uc="off-road">Off-road</button>
    <button class="filter-btn" data-uc="transport">Transport</button>
    <button class="filter-btn" data-uc="utility">Utility</button>
    <button class="filter-btn" data-uc="grinding">Grinding</button>
    <button class="filter-btn" data-uc="collector">Collector</button>
    <button class="filter-btn" data-uc="fun">Fun</button>
  </div>
</header>
<div class="stats" id="stats"></div>
<main id="main"><div class="loading">Loading vehicles...</div></main>

<script>
// --- LaunchDarkly setup ---
const _isNewUser = (function() {
  const existingKey = localStorage.getItem('ld_context_key');
  const key = existingKey ?? crypto.randomUUID();
  if (!existingKey) localStorage.setItem('ld_context_key', key);
  window._ldContext = { kind: 'user', key: key, anonymous: true };
  return !existingKey;
})();
const ldClient = LDClient.initialize('69d6ee4fff89900a93b15def', window._ldContext);
const ldReady = ldClient.waitForInitialization().catch(() => {}); // graceful degradation — app works even if LD fails
ldReady.then(() => ldClient.track('ld-initialized', { isNewUser: _isNewUser }));

// --- App state ---
let vehicles = [];
let owned = new Set(JSON.parse(localStorage.getItem('gtaOwnedCars') || '[]'));
let filter = '';
let useCaseFilter = null;
let sortOrder = 'class';
let minPrice = null;
let maxPrice = null;

function saveOwned() {
  localStorage.setItem('gtaOwnedCars', JSON.stringify([...owned]));
}

function toggleOwned(hash) {
  const wasOwned = owned.has(hash);
  if (wasOwned) owned.delete(hash);
  else owned.add(hash);
  saveOwned();
  const v = vehicles.find(v => v.Hash === hash);
  ldReady.then(() => ldClient.track('vehicle-toggled', { direction: wasOwned ? 'unowned' : 'owned', vehicleClass: v?.Class || 'unknown' }));
  render();
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const classVal = document.getElementById('classFilter').value;
  const storeVal = document.getElementById('storeFilter').value;

  const filtered = vehicles.filter(v => {
    const name = v.DisplayName.English.toLowerCase();
    const mfg = (v.ManufacturerDisplayName?.English || '').toLowerCase();
    const storeText = (v.stores || []).join(' ').toLowerCase();
    const matchSearch = !search || name.includes(search) || mfg.includes(search) || storeText.includes(search);
    const matchClass = !classVal || v.Class === classVal;
    const matchStore = !storeVal || (v.stores && v.stores.includes(storeVal));
    const isOwned = owned.has(v.Hash);
    const matchFilter = !filter || (filter === 'owned' && isOwned) || (filter === 'missing' && !isOwned);
    const matchUseCase = !useCaseFilter || (v.use_case || []).includes(useCaseFilter);
    const price = v.price ?? null;
    const priceActive = minPrice !== null || maxPrice !== null;
    const matchPrice = !priceActive || (price !== null && (minPrice === null || price >= minPrice) && (maxPrice === null || price <= maxPrice));
    return matchSearch && matchClass && matchStore && matchFilter && matchUseCase && matchPrice;
  });

  const groups = {};
  filtered.forEach(v => {
    if (!groups[v.Class]) groups[v.Class] = [];
    groups[v.Class].push(v);
  });

  const totalOwned = vehicles.filter(v => owned.has(v.Hash)).length;
  const showPct = ldClient.variation('show-completion-percentage', false);
  const showMissingCount = ldClient.variation('show-missing-count', false);
  const pctPart = showPct ? ' (' + Math.round(totalOwned / vehicles.length * 100) + '%)' : '';
  const missingPart = showMissingCount ? ' — <span>' + (vehicles.length - totalOwned) + '</span> missing' : '';
  document.getElementById('stats').innerHTML =
    'You own <span>' + totalOwned + '</span> of <span>' + vehicles.length + '</span> vehicles' + pctPart + missingPart + ' — Showing <span>' + filtered.length + '</span>';

  const main = document.getElementById('main');
  if (filtered.length === 0) {
    main.innerHTML = '<div class="empty-state">No vehicles found</div>';
    if (vehicles.length > 0) {
      ldReady.then(() => ldClient.track('no-results-shown', {
        searchQuery: document.getElementById('search').value,
        classFilter: document.getElementById('classFilter').value,
        storeFilter: document.getElementById('storeFilter').value,
        ownershipFilter: filter || 'all',
      }));
    }
    return;
  }

  let displayGroups = groups;
  let sortedKeys;
  if (sortOrder === 'laptime') {
    const flat = [...filtered].sort((a, b) => {
      if (a.racing_lap_time == null && b.racing_lap_time == null) return 0;
      if (a.racing_lap_time == null) return 1;
      if (b.racing_lap_time == null) return -1;
      return a.racing_lap_time - b.racing_lap_time;
    });
    displayGroups = {};
    flat.forEach(v => {
      const key = v.vehicleClass || v.Class;
      if (!displayGroups[key]) displayGroups[key] = [];
      displayGroups[key].push(v);
    });
    sortedKeys = Object.keys(displayGroups);
  } else {
    sortedKeys = Object.keys(groups).sort();
  }
  main.innerHTML = sortedKeys.map(cls => {
    const cars = displayGroups[cls];
    const clsOwned = cars.filter(v => owned.has(v.Hash)).length;
    return '<div class="class-group">' +
      '<div class="class-header"><span>' + cls + '</span><span class="class-count">' + clsOwned + ' / ' + cars.length + '</span></div>' +
      '<div class="car-grid">' +
      cars.map(v => {
        const isOwned = owned.has(v.Hash);
        const imgUrl = 'https://gtav-vehicle-database.vercel.app/vehicle-images/' + v.Name.toLowerCase() + '.png';
        return '<div class="car-item' + (isOwned ? ' owned' : '') + '" data-hash="' + v.Hash + '">' +
          '<div class="check">' + (isOwned ? '&#10003;' : '') + '</div>' +
          '<div class="car-img-wrap"><img src="' + imgUrl + '" alt="' + v.DisplayName.English + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<span class=no-img>No image</span>\'"></div>' +
          '<div class="car-info">' +
            '<div class="car-name">' + v.DisplayName.English + '</div>' +
            '<div class="car-mfg">' + (v.ManufacturerDisplayName?.English || '') + '</div>' +
            (v.price ? '<div class="car-price">$' + v.price.toLocaleString() + '</div>' : '') +
            (v.trade_price ? '<div class="car-price" style="color:#6a9">Trade: $' + v.trade_price.toLocaleString() + '</div>' : '') +
            (v.stores && v.stores.length ? '<div class="car-store">' + v.stores.map(s => '<span class="store-tag' + (s === 'Premium Deluxe Motorsport' ? ' pdm' : '') + '">' + s + '</span>').join('') + '</div>' : '') +
          '</div>' +
          (function(f) {
            var badges = [];
            if (f.includes('HSW Performance Upgrade')) badges.push('<span class="feat-badge feat-hsw">HSW</span>');
            if (f.includes('Drift Tuning')) badges.push('<span class="feat-badge feat-drift">Drift</span>');
            if (f.includes('Missile Lock-On Jammer')) badges.push('<span class="feat-badge feat-jammer">Jammer</span>');
            if (f.includes('Weaponized Vehicle')) badges.push('<span class="feat-badge feat-weapon">Weaponized</span>');
            if (f.includes('Custom Vehicle')) badges.push('<span class="feat-badge feat-bennys">Benny\'s</span>');
            if (f.includes('Imani Tech')) badges.push('<span class="feat-badge feat-imani">Imani</span>');
            if (f.includes('Service Vehicle')) badges.push('<span class="feat-badge feat-service">Service</span>');
            return badges.length ? '<div class="car-features">' + badges.join('') + '</div>' : '';
          })(v.features || []) +
          (function(tier, topSpeed, uc) {
            var out = '';
            if (tier) {
              var tierCls = tier === 'S' ? 'tier-S' : (tier >= 'A' && tier <= 'G') ? 'tier-' + tier : 'tier-low';
              var label = tier + (topSpeed ? ' · ' + Math.round(topSpeed) + 'mph' : '');
              out += '<div class="car-features"><span class="tier-badge ' + tierCls + '">' + label + '</span></div>';
            }
            if (uc && uc.length) {
              out += '<div class="use-case-chips">' + uc.map(function(u) { return '<span class="uc-chip uc-' + u + '">' + u + '</span>'; }).join('') + '</div>';
            }
            return out;
          })(v.racing_tier, v.top_speed_mph, v.use_case) +
          (function(stats) {
            if (!stats || stats.every(function(s) { return s == null; })) return '';
            var labels = ['Acc','Brk','Trc','Hdl'];
            var rows = labels.map(function(lbl, i) {
              var val = stats[i];
              if (val == null) return '';
              var hue = Math.round(val * 1.2);
              return '<div class="stat-row"><span class="stat-label">' + lbl + '</span>'
                + '<div class="stat-bar-bg"><div class="stat-bar" style="width:' + val + '%;background:hsl(' + hue + ',70%,40%)"></div></div></div>';
            }).join('');
            return rows ? '<div class="car-stats">' + rows + '</div>' : '';
          })([v.stat_acceleration, v.stat_braking, v.stat_traction, v.stat_handling]) +
          '</div>';
      }).join('') +
      '</div></div>';
  }).join('');
}

document.addEventListener('click', e => {
  const item = e.target.closest('.car-item');
  if (item) toggleOwned(Number(item.dataset.hash));
});

document.addEventListener('keydown', e => {
  const t = e.target;
  if (t.tagName === 'INPUT' || t.tagName === 'SELECT' || t.tagName === 'TEXTAREA') return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key.length === 1) { const s = document.getElementById('search'); s.value = ''; s.focus(); }
});
let _searchDebounce;
document.getElementById('search').addEventListener('input', () => {
  render();
  clearTimeout(_searchDebounce);
  _searchDebounce = setTimeout(() => {
    const q = document.getElementById('search').value;
    if (q) {
      const resultCount = document.querySelectorAll('.car-item').length;
      ldReady.then(() => ldClient.track('search-performed', { query: q, resultCount }));
    }
  }, 500);
});
document.getElementById('classFilter').addEventListener('change', e => {
  render();
  ldReady.then(() => ldClient.track('filter-changed', { filterType: 'class', value: e.target.value }));
});
document.getElementById('storeFilter').addEventListener('change', e => {
  render();
  ldReady.then(() => ldClient.track('filter-changed', { filterType: 'store', value: e.target.value }));
});

['minPrice', 'maxPrice'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const minEl = document.getElementById('minPrice');
    const maxEl = document.getElementById('maxPrice');
    minPrice = minEl.value ? Number(minEl.value) : null;
    maxPrice = maxEl.value ? Number(maxEl.value) : null;
    render();
    if (minPrice !== null || maxPrice !== null) {
      ldReady.then(() => ldClient.track('filter-changed', { filterType: 'price', min: minPrice, max: maxPrice }));
    }
  });
});

document.getElementById('sortOrder').addEventListener('change', e => {
  sortOrder = e.target.value;
  render();
});

document.querySelectorAll('[data-uc]').forEach(btn => {
  btn.addEventListener('click', () => {
    const uc = btn.dataset.uc;
    useCaseFilter = useCaseFilter === uc ? null : uc;
    document.querySelectorAll('[data-uc]').forEach(b => b.classList.toggle('uc-active', b.dataset.uc === useCaseFilter));
    ldReady.then(() => ldClient.track('filter-changed', { filterType: 'use_case', value: useCaseFilter || 'all' }));
    render();
  });
});

['showAll', 'showOwned', 'showMissing'].forEach(id => {
  document.getElementById(id).addEventListener('click', () => {
    filter = id === 'showAll' ? '' : id === 'showOwned' ? 'owned' : 'missing';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    ldReady.then(() => ldClient.track('filter-changed', { filterType: 'ownership', value: filter || 'all' }));
    render();
  });
});

// Fetch DurtyFree data at runtime, then patch with local vehicles.json
const DURTYFREE_URL = 'https://raw.githubusercontent.com/DurtyFree/gta-v-data-dumps/master/vehicles.json';
const excludedClasses = new Set(['RAIL']);

Promise.all([
  fetch(DURTYFREE_URL).then(r => r.json()),
  fetch('vehicles.json').then(r => r.json()),
  ldReady
]).then(([dfData, patchData]) => {
  // Build patch lookup by normalized name
  const patchByName = {};
  for (const p of patchData) {
    patchByName[p.name.toLowerCase()] = p;
  }

  const seen = new Set();

  // Process DurtyFree vehicles, patching with local data
  vehicles = dfData
    .filter(v => v.DisplayName?.English && !excludedClasses.has(v.Class))
    .map(v => {
      const name = v.DisplayName.English;
      const patch = patchByName[name.toLowerCase()];
      seen.add(name.toLowerCase());
      return {
        ...v,
        stores: patch?.stores || [],
        features: patch?.features || [],
        price: patch?.price ?? null,
        trade_price: patch?.trade_price ?? null,
        racing_tier: patch?.racing_tier ?? null,
        racing_lap_time: patch?.racing_lap_time ?? null,
        top_speed_mph: patch?.top_speed_mph ?? null,
        stat_acceleration: patch?.stat_acceleration ?? null,
        stat_braking: patch?.stat_braking ?? null,
        stat_traction: patch?.stat_traction ?? null,
        stat_handling: patch?.stat_handling ?? null,
        use_case: patch?.use_case || [],
      };
    });

  // Add patch-only vehicles (ones DurtyFree doesn't have)
  for (const p of patchData) {
    if (seen.has(p.name.toLowerCase())) continue;
    if (!p.stores.length && !p.features.length) continue;
    vehicles.push({
      Name: p.internalName,
      DisplayName: { English: p.name },
      ManufacturerDisplayName: p.manufacturer ? { English: p.manufacturer } : null,
      Hash: p.hash,
      Class: p.vehicleClass,
      stores: p.stores,
      features: p.features,
      image: p.image,
      price: p.price ?? null,
      trade_price: p.trade_price ?? null,
      racing_tier: p.racing_tier ?? null,
      racing_lap_time: p.racing_lap_time ?? null,
      top_speed_mph: p.top_speed_mph ?? null,
      stat_acceleration: p.stat_acceleration ?? null,
      stat_braking: p.stat_braking ?? null,
      stat_traction: p.stat_traction ?? null,
      stat_handling: p.stat_handling ?? null,
      use_case: p.use_case || [],
    });
  }

  vehicles.sort((a, b) => {
    const classCompare = a.Class.localeCompare(b.Class);
    if (classCompare !== 0) return classCompare;
    return (a.DisplayName.English || '').localeCompare(b.DisplayName.English || '');
  });

  const classes = [...new Set(vehicles.map(v => v.Class))].sort();
  const sel = document.getElementById('classFilter');
  classes.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
  const allStores = [...new Set(vehicles.flatMap(v => v.stores || []))].sort();
  const storeSel = document.getElementById('storeFilter');
  allStores.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; storeSel.appendChild(o); });
  document.getElementById('showAll').classList.add('active');
  render();
  ldReady.then(() => ldClient.track('vehicles-rendered', { count: vehicles.length }));
}).catch(err => {
  document.getElementById('main').innerHTML = '<div class="empty-state">Failed to load vehicle data. Please try again later.</div>';
  ldReady.then(() => ldClient.track('load-failed', { message: err?.message || String(err), type: err?.name || 'Error' }));
  console.error('Failed to fetch vehicles:', err);
});
</script>
</body>
</html>
